app = "bobasticker-wa"
primary_region = "sin"  # Singapore — dekat Indonesia

[build]

[env]
  PREFIX = "."
  NODE_ENV = "production"
  PORT = "3000"

[mounts]
  source = "wa_auth_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
